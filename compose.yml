services:
  phork-database:
    container_name: phork-database
    image: postgres:13.4-alpine
    volumes:
      - phork-database-data:/var/lib/postgresql/data:cached
    environment:
      POSTGRES_PASSWORD: "Passw0rd"
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=ja_JP.UTF-8"
      POSTGRES_USER: "webapp"

  phork-app:
    container_name: phork-app
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - phork-database
    environment:
      DEBUG: 1
      APP_ENV: development
      DB_HOST: phork-database
      DB_PORT: 5432
      DB_NAME: webapp
      DB_USER: webapp
      DB_PASSWORD: Passw0rd
    volumes:
      - ./:/srv/app
  phork-app-8.3:
    container_name: phork-app-8.3
    build:
      context: ./
      dockerfile: Dockerfile.8.3
    depends_on:
      - phork-database
    environment:
      DEBUG: 1
      APP_ENV: development
      DB_HOST: phork-database
      DB_PORT: 5432
      DB_NAME: webapp
      DB_USER: webapp
      DB_PASSWORD: Passw0rd
    volumes:
      - ./:/srv/app

volumes:
  phork-database-data:
